<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimPesca — Ranking</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050a0f">
<style>
:root{--bg:#050a0f;--card:#0d151d;--surface:#121d28;--border:#1a2736;--accent:#00d4ff;--green:#00e676;--gold:#ffd700;--silver:#c0c8d0;--bronze:#cd7f32;--red:#ff1744;--text:#e0e6ed;--dim:#7b8d9e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:20px;max-width:720px;margin:0 auto;}
header{display:flex;align-items:center;gap:12px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:16px;flex-wrap:wrap;}
header h1{font-size:1.4rem;font-weight:800;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.btn-link{font-size:0.7rem;padding:8px 14px;border:1px solid var(--dim);border-radius:8px;color:var(--dim);text-decoration:none;letter-spacing:1px;cursor:pointer;background:transparent;font-family:inherit;}
.spacer{margin-left:auto;}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filtro{padding:8px 16px;border:1px solid #3d5d7e;border-radius:20px;background:rgba(20,40,64,0.45);color:#b9d2e6;cursor:pointer;font-size:0.85rem;font-family:inherit;}
.filtro.ativo{border-color:var(--accent);color:#fff;background:rgba(0,212,255,0.18);font-weight:700;}
.lista{display:flex;flex-direction:column;gap:8px;}
.linha-rank{display:flex;align-items:center;gap:14px;background:#0c1722;border:1px solid #1c344e;border-radius:12px;padding:14px 16px;}
.pos{font-size:1.35rem;font-weight:800;min-width:44px;text-align:center;color:#9fb6cc;}
.linha-rank.top1{border-color:var(--gold);box-shadow:0 0 18px rgba(255,215,0,0.15);} .top1 .pos{color:var(--gold);}
.linha-rank.top2{border-color:var(--silver);} .top2 .pos{color:#dde4ea;}
.linha-rank.top3{border-color:var(--bronze);} .top3 .pos{color:#e89c50;}
.info{flex:1;min-width:0;}
.nome{font-size:1.1rem;font-weight:700;color:#eef6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meta{font-size:0.78rem;color:#8fb0cc;margin-top:2px;}
.metros{font-size:1.35rem;font-weight:800;color:var(--green);font-family:monospace;white-space:nowrap;text-shadow:0 0 10px rgba(0,230,118,0.3);}
.vazio{text-align:center;color:#9fb6cc;padding:40px 20px;font-size:0.95rem;}
.acoes{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.btn{padding:10px 18px;border:1px solid;border-radius:8px;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:transparent;}
.btn-green{border-color:var(--green);color:var(--green);} .btn-red{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header>
  <span style="font-size:1.6rem">🏆</span>
  <h1>Ranking</h1>
  <button class="btn-link spacer" onclick="toggleConfig()">⚙️ Configuração</button>
  <a href="player.html" class="btn-link">▶ Player</a>
</header>

<div id="configPanel" style="display:none;margin-bottom:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:0.85rem;color:var(--text);white-space:nowrap;">⚙️ Peso na pontuação (multiplicador = peso <sup>expoente</sup>):</span>
    <input type="number" id="cfgPesoExp" min="0" max="5" step="0.05" value="2.4" onchange="salvarPesoExp()" style="width:84px;background:#0d151d;border:1px solid var(--accent);border-radius:6px;color:var(--text);font-family:monospace;font-size:1rem;padding:6px 8px;text-align:center;outline:none;">
  </div>
  <div id="cfgPesoHint" style="font-size:0.72rem;color:var(--dim);margin-top:7px;line-height:1.5;"></div>
  <div class="acoes" style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
    <button class="btn btn-green" onclick="exportar()">⬇ Exportar ranking</button>
    <button class="btn btn-green" onclick="document.getElementById('impRanking').click()">⬆ Importar ranking</button>
    <input type="file" id="impRanking" accept="application/json,.json" style="display:none" onchange="importar(event)">
    <button class="btn btn-red" onclick="limpar()">🗑 Limpar ranking</button>
  </div>
</div>

<div class="filtros" id="filtros">
  <button class="filtro ativo" data-sim="todos" onclick="filtrar('todos',this)">Todas</button>
</div>
<div class="filtros" id="filtrosCls">
  <button class="filtro ativo" data-cls="todas" onclick="filtrarCls('todas',this)">Todo peso</button>
  <button class="filtro" data-cls="leve" onclick="filtrarCls('leve',this)">Leve</button>
  <button class="filtro" data-cls="medio" onclick="filtrarCls('medio',this)">Médio</button>
  <button class="filtro" data-cls="pesado" onclick="filtrarCls('pesado',this)">Pesado</button>
  <button class="filtro" data-cls="trofeu" onclick="filtrarCls('trofeu',this)">Troféu</button>
</div>

<div class="lista" id="lista"></div>

<script>
let filtroAtual='todos';
function toggleConfig(){ const p=document.getElementById('configPanel'); p.style.display = (p.style.display==='none'||!p.style.display) ? 'block' : 'none'; }
const ESPECIES=[
  {id:'pirarara', nome:'Pirarara'},
  {id:'tambaqui', nome:'Tambacu'},
  {id:'tucunare', nome:'Tucunaré'},
  {id:'dourado',  nome:'Dourado'},
  {id:'trairao',  nome:'Trairão'},
  {id:'jau',      nome:'Jaú'}
];
function nomePeixe(id){ const e=ESPECIES.find(x=>x.id===id); return e?e.nome:('Sim '+id); }
function carregar(){ try{ return JSON.parse(localStorage.getItem('simpesca2_ranking'))||[]; }catch(e){ return []; } }
function nomeValido(n){ n=(n||'').trim().toLowerCase(); return n!=='' && n!=='jogador'; }   // jogada sem nome não conta
function fmtData(iso){ const d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
// Expoente do peso na pontuação (peso^EXP) — CONFIGURÁVEL aqui (campo ⚙️). Salvo no aparelho; o player lê a mesma chave.
function pesoExp(){ const v=parseFloat(localStorage.getItem('simpesca2_rank_pesoexp')); return (isFinite(v)&&v>=0)?v:2.4; }
function scoreRank(r){ const p=(isFinite(r.peso)&&r.peso>0)?r.peso:1; return Math.round((r.metros||0)*Math.pow(p, pesoExp())); }   // RECALCULA sempre (registro antigo re-ordena consistente)
const PESO_MAX_DEF={pirarara:50, tambaqui:40, tucunare:13, dourado:30, trairao:15, jau:80};   // peso máx (100%) por espécie — mesma fonte do player/dashboard
function pesoMaxEsp(id){ return PESO_MAX_DEF[id]||20; }
const CLASSES_PESO=[{id:'leve',nome:'Leve',cor:'#00e676',max:30},{id:'medio',nome:'Médio',cor:'#ffd600',max:60},{id:'pesado',nome:'Pesado',cor:'#ff8f3c',max:90},{id:'trofeu',nome:'Troféu',cor:'#b388ff',max:100}];
function classePesoPct(pct){ for(let i=0;i<CLASSES_PESO.length;i++){ if(pct<=CLASSES_PESO[i].max) return CLASSES_PESO[i]; } return CLASSES_PESO[3]; }
function classePesoReg(r){ const mx=pesoMaxEsp(r.sim); const pct=(mx>0&&isFinite(r.peso))?(r.peso/mx*100):100; return classePesoPct(pct); }
function atualizarPesoHint(){ const e=pesoExp(), h=document.getElementById('cfgPesoHint'); if(h) h.textContent='com a MESMA linha, um peixe de 50 kg vale ×'+Math.pow(50,e).toFixed(1)+' que um de 1 kg · 0 = ignora peso · 1 = peso cheio'; }
function salvarPesoExp(){ const el=document.getElementById('cfgPesoExp'); const v=parseFloat(el.value); if(isFinite(v)&&v>=0){ localStorage.setItem('simpesca2_rank_pesoexp', v); atualizarPesoHint(); render(); syncPesoExp(); } else el.value=pesoExp(); }
// Sobe cal.pesoexp pro config.json (read-modify-write) — só num aparelho COM token (o totem só lê, via player/aplicarConfig).
const GH_REPO='guilhermeogera-beep/Simularpesca2', GH_CONFIG='config.json';
function ghToken(){ return (localStorage.getItem('simpesca2_github_token')||'').trim(); }
async function syncPesoExp(){
  if(!ghToken() || !navigator.onLine) return;
  const headers={'Authorization':'token '+ghToken(),'Accept':'application/vnd.github+json'}, url='https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_CONFIG;
  let cfg=null, sha=null;
  try{ const g=await fetch(url,{headers,cache:'no-store'});
    if(g.ok){ const j=await g.json(); sha=j.sha; try{ cfg=JSON.parse(decodeURIComponent(escape(atob((j.content||'').replace(/\s/g,''))))); }catch(e){ cfg=null; } }
    else if(g.status===404){ cfg={versao:2,tipo:'config',cal:{},gen:{},sync:{}}; }
    else { return; }
  }catch(e){ return; }
  if(!cfg || typeof cfg!=='object') return;   // existe mas não deu pra ler -> NÃO sobrescreve gen/sync/cal
  cfg.cal=cfg.cal||{}; cfg.cal.pesoexp=pesoExp(); cfg.criado=new Date().toISOString();
  const body={message:'auto: peso na pontuacao', content:btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))))}; if(sha) body.sha=sha;
  try{ await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)}); }catch(e){}
}
function render(){
  const todos=carregar().filter(r=>nomeValido(r.nome));   // esconde jogadas sem nome / "Jogador"
  let lista = filtroAtual==='todos' ? todos : todos.filter(r=>r.sim===filtroAtual);
  if(filtroCls!=='todas') lista=lista.filter(r=>classePesoReg(r).id===filtroCls);   // filtro por classe de peso
  lista.sort((a,b)=>scoreRank(b)-scoreRank(a));   // ordena pela PONTUAÇÃO
  const el=document.getElementById('lista');
  if(!lista.length){ el.innerHTML='<div class="vazio">Nenhuma jogada registrada ainda.<br>Jogue uma simulação para aparecer aqui! 🎣</div>'; return; }
  el.innerHTML = lista.map((r,i)=>{
    const cls = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const medalha = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'º';
    return `<div class="linha-rank ${cls}">
      <div class="pos">${medalha}</div>
      <div class="info"><div class="nome">${escapeHtml(r.nome)}</div><div class="meta">🐟 ${nomePeixe(r.sim)} · ${isFinite(r.peso)?'⚖️ '+r.peso.toFixed(1)+' kg <b style="color:'+classePesoReg(r).cor+'">'+classePesoReg(r).nome+'</b> · ':''}🎣 ${r.metros.toFixed(1)} m · ${fmtData(r.data)}</div></div>
      <div class="metros">${scoreRank(r)} pts</div>
    </div>`;
  }).join('');
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function filtrar(sim,btn){ filtroAtual=sim; document.querySelectorAll('#filtros .filtro').forEach(b=>b.classList.remove('ativo')); btn.classList.add('ativo'); render(); }
let filtroCls='todas';
function filtrarCls(cls,btn){ filtroCls=cls; document.querySelectorAll('#filtrosCls .filtro').forEach(b=>b.classList.remove('ativo')); btn.classList.add('ativo'); render(); }
function exportar(){
  const blob=new Blob([JSON.stringify(carregar(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ranking_simpesca.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importar(ev){
  const f=ev.target.files[0]; ev.target.value=''; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{
      const d=JSON.parse(e.target.result);
      const nova=Array.isArray(d)?d:(Array.isArray(d.ranking)?d.ranking:null);   // aceita o array exportado (ou {ranking:[...]})
      if(!nova) throw 0;
      const atual=carregar(), chave=x=>[x.nome,x.sim,x.metros,x.data].join('|'), ex=new Set(atual.map(chave)); let add=0;
      nova.forEach(x=>{ if(x && x.nome!=null && !ex.has(chave(x))){ atual.push(x); ex.add(chave(x)); add++; } });   // JUNTA, ignora repetidas (mesma jogada)
      localStorage.setItem('simpesca2_ranking', JSON.stringify(atual)); render();
      alert(add+' jogada(s) importada(s)'+(nova.length-add>0?' · '+(nova.length-add)+' repetida(s) ignorada(s)':'')+'.');
    }catch(err){ alert('Arquivo inválido — use um ranking exportado (.json).'); } };
  r.readAsText(f);
}
function limpar(){ if(confirm('Apagar TODO o ranking? Não dá para desfazer.')){ localStorage.removeItem('simpesca2_ranking'); render(); } }
window.addEventListener('load',()=>{
  const f=document.getElementById('filtros');
  ESPECIES.forEach(e=>{ const b=document.createElement('button'); b.className='filtro'; b.dataset.sim=e.id; b.textContent=e.nome; b.onclick=()=>filtrar(e.id,b); f.appendChild(b); });
  if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  document.getElementById('cfgPesoExp').value=pesoExp(); atualizarPesoHint();
  render();
});
</script>
</body>
</html>

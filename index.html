  <style>
    body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    .logo { width: 180px; height: 180px; object-fit: contain; margin-bottom: 20px; border-radius: 20px; }
    h1 { font-size: 24px; margin-bottom: 10px; color: #ffffff; }
    .btn { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 16px; display: none; cursor: pointer; margin: 20px auto; box-shadow: 0 4px 15px rgba(39,174,96,0.4); }
    .status { color: #f1c40f; margin-top: 20px; font-size: 16px; max-width: 300px; line-height: 1.5; }
  </style>
</head>
<body>

  <img src="logo-capacete.png" alt="Logo Capacete Seco" class="logo">
  <h1>Capacete Seco Pro</h1>
  
  <button id="btnInstalar" class="btn">📥 INSTALAR APLICATIVO</button>
  
  <p id="msgStatus" class="status">Verificando conexão com o secador...</p>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    const IP_ESP = "http://192.168.4.1";

    function testarConexao() {
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.getElementById('msgStatus').innerText = "Conectando ao secador...";
        
        const img = new Image();
        img.src = IP_ESP + "/ping.gif?t=" + new Date().getTime();
        
        img.onload = function() {
          window.location.href = IP_ESP;
        };
        
        img.onerror = function() {
          document.getElementById('msgStatus').innerHTML = "⚠️ Por favor, conecte seu celular no Wi-Fi<br><b style='color:#00E5FF;'>SecadorCapacete</b> para usar o painel.";
          setTimeout(testarConexao, 3000);
        };
      } else {
        document.getElementById('msgStatus').innerText = "Instale o aplicativo clicando no botão acima antes de conectar ao Wi-Fi do Secador.";
      }
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('btnInstalar').style.display = 'block';
    });

    document.getElementById('btnInstalar').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
          if (choice.outcome === 'accepted') {
            document.getElementById('btnInstalar').style.display = 'none';
          }
        });
      }
    });

    testarConexao();
  </script>
</body>
</html>

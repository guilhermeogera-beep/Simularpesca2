<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capacete Seco Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b528f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #E0E0E0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        h1 { font-weight: 300; color: #00E5FF; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; max-width: 300px; }
        .btn { background: #00E5FF; color: #121212; border: none; padding: 15px 30px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; font-size: 14px; width: 80%; max-width: 300px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,229,255,0.3); }
        #btnInstalar { background: #27ae60; color: white; display: none; box-shadow: 0 4px 15px rgba(39,174,96,0.4); }
    </style>
</head>
<body>

    <h1>CAPACETE SECO</h1>
    <p>Conecte no Wi-Fi do secador antes de acessar o painel de controle.</p>

    <button id='btnInstalar' class="btn">📥 INSTALAR APLICATIVO</button>
    
    <button class="btn" onclick="entrarNoSecador()">🔌 CONECTAR AO SECADOR</button>

    <script>
        function entrarNoSecador() {
            // Abre o painel do ESP32 mantendo o modo standalone (tela cheia do PWA)
            window.location.href = "http://192.168.4.1/";
        }

        // Lógica nativa de instalação do PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnInstalar').style.display = 'block';
        });

        document.getElementById('btnInstalar').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((res) => {
                    if (res.outcome === 'accepted') {
                        document.getElementById('btnInstalar').style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        });

        // Registra o Service Worker obrigatoriamente
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
